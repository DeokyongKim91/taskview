<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <title>업무 현황 통합 관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --brand-start: #009A44; --brand-end: #005BAC;
            --surface: #ffffff; --surface-2: #f4fbf7; --border: #d6eee3;
            --text-primary: #0d2318; --text-secondary: #527060;
            --radius-lg: 16px; --radius-md: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #eef8f2; min-height: 100vh; color: var(--text-primary); margin: 0; padding: 0; }
        a { text-decoration: none !important; color: inherit !important; }

        .app-header { background: linear-gradient(135deg, #009A44 0%, #007a36 40%, #005BAC 100%); padding: 30px 24px 70px; position: relative; overflow: hidden; }
        .header-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .header-sub { font-size: 13px; color: rgba(255,255,255,.8); margin: 0; }
        .header-refresh { position: absolute; top: 30px; right: 24px; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3); color: #fff; border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all .2s; }

        .main-wrap { padding: 0 16px 40px; margin-top: -45px; position: relative; z-index: 1; max-width: 1300px; margin-left: auto; margin-right: auto; }

        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 0 5px; }
        .stats-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border-radius: var(--radius-lg); padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1 1 calc(25% - 10px); min-width: 140px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .stat-num { font-size: 18px; font-weight: 700; line-height: 1; }
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .stats-wrap.collapsed { gap: 6px; }
        .stats-wrap.collapsed .stat-card { flex: 0 0 auto; min-width: 100px; padding: 6px 12px; border-radius: 30px; flex-direction: row; }
        .stats-wrap.collapsed .stat-icon { width: 22px; height: 22px; font-size: 11px; }
        .stats-wrap.collapsed .stat-text-box { display: flex; align-items: center; gap: 6px; }
        .stats-wrap.collapsed .stat-label { margin: 0; white-space: nowrap; font-size: 11px; }

        .panel { background: var(--surface); border-radius: var(--radius-lg); box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); overflow: hidden; }
        .panel-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 16px; border-bottom: 1px solid #f0f0f0; }
        
        .filter-group { display: flex; gap: 4px; background: #f0f5f2; border-radius: 30px; padding: 4px; }
        .filter-chip input { display: none; }
        .filter-chip label { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; color: #666; transition: 0.2s; }
        .filter-chip input:checked + label { background: #009A44; color: #fff; box-shadow: 0 2px 5px rgba(0,154,68,0.3); }

        .view-tabs { display: flex; gap: 4px; }
        .view-tab-btn { border: none; background: #f8f9fa; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #777; cursor: pointer; }
        .view-tab-btn.active { background: #e7f3ed; color: #009A44; font-weight: 600; }

        .view-body { padding: 20px; min-height: 450px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* GANTT 상단 스크롤 및 숨김 처리 */
        #gantt-top-scroll { overflow-x: auto; overflow-y: hidden; height: 12px; background: #fcfcfc; border: 1px solid #eee; border-bottom: none; border-top-left-radius: 8px; border-top-right-radius: 8px; }
        #gantt-top-scroll::-webkit-scrollbar { height: 8px; }
        #gantt-top-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        #gantt-top-scroll::-webkit-scrollbar-track { background: #fcfcfc; }
        #gantt-top-scroll-inner { height: 1px; }
        
        #gantt { overflow-x: auto; min-height: 400px; border: 1px solid #eee; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; border-top: none; }
        #gantt::-webkit-scrollbar { display: none; }
        #gantt { -ms-overflow-style: none; scrollbar-width: none; }
        .gantt-error-box { text-align: center; padding: 50px 20px; color: #dc3545; }

        .assignee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .assignee-card { background: #f9fbf9; border: 1px solid #e0ede5; border-radius: 12px; padding: 15px; }
        .task-item { background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 12px; cursor: pointer; }
        .chart-wrap { height: 280px; width: 100%; margin-bottom: 20px; }

        #loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .drawer { position: fixed; top: 0; right: -420px; width: 420px; max-width: 90vw; height: 100%; background: #fff; box-shadow: -5px 0 20px rgba(0,0,0,0.1); z-index: 1050; transition: right 0.3s ease; display: flex; flex-direction: column; }
        .drawer.open { right: 0; }
        .drawer-header { padding: 18px; background: #009A44; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { padding: 15px; overflow-y: auto; flex: 1; }
        .drawer-item { border: 1px solid #eee; border-radius: 10px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .drawer-item:hover { border-color: #009A44; background: #fafffc; }
        
        /* 모바일 최적화 */
        @media (max-width: 640px) {
            .stat-card { flex: 1 1 calc(50% - 10px); }
            .stats-wrap.collapsed .stat-card { flex: 1 1 calc(25% - 6px); padding: 5px; }
            .view-tabs { overflow-x: auto; width: 100%; }
            
            /* 간트 컨트롤 레이아웃 개선 */
            .gantt-controls-wrap { flex-direction: column; align-items: flex-start; gap: 10px; }
            .gantt-controls-wrap select { width: 100% !important; }
            .gantt-controls-wrap .btn-group { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>

<body>
    <div id="loading"><div class="spinner-border text-success mb-2"></div><div>데이터 동기화 중...</div></div>

    <div class="app-header">
        <h1 class="header-title">업무 현황 관리</h1>
        <p class="header-sub">실시간 데이터 연동 프로젝트 대시보드</p>
        <button class="header-refresh" onclick="fetchData()">↺ 새로고침</button>
    </div>

    <div class="main-wrap">
        <div class="stats-header">
            <span class="small fw-bold text-muted">📊 요약 현황</span>
            <button id="statsToggleBtn" class="btn btn-sm text-muted p-0" onclick="toggleStats()">접기 ▲</button>
        </div>
        <div class="stats-wrap" id="statsContainer"></div>

        <div class="panel">
            <div class="panel-toolbar">
                <div class="filter-group">
                    <div class="filter-chip"><input type="radio" name="sheetFilter" id="fAll" value="all" checked><label for="fAll">전체</label></div>
                    <div class="filter-chip"><input type="radio" name="sheetFilter" id="fInt" value="인터넷"><label for="fInt">인터넷</label></div>
                    <div class="filter-chip"><input type="radio" name="sheetFilter" id="fSmt" value="스마트"><label for="fSmt">스마트</label></div>
                </div>
                <div class="view-tabs">
                    <button class="view-tab-btn active" data-target="calendar-view" onclick="switchTab(this)">🗓 캘린더</button>
                    <button class="view-tab-btn" data-target="gantt-view" onclick="switchTab(this)">📊 간트차트</button>
                    <button class="view-tab-btn" data-target="monthly-view" onclick="switchTab(this)">📈 통계</button>
                    <button class="view-tab-btn" data-target="assignee-view" onclick="switchTab(this)">🧑‍💻 담당자</button>
                </div>
            </div>

            <div class="view-body">
                <div id="calendar-view" class="tab-panel active"><div id="calendar"></div></div>
                <div id="gantt-view" class="tab-panel">
                    <div class="d-flex justify-content-between align-items-center mb-3 gantt-controls-wrap">
                        <select id="ganttFilter" class="form-select form-select-sm w-auto shadow-sm" onchange="renderGantt()">
                            <option value="active" selected>진행 업무 (완료/취소 제외)</option>
                            <option value="all">전체 내역</option>
                            <option value="작업 대기">작업 대기</option>
                            <option value="진행중">진행중</option>
                            <option value="검증 반영">검증 반영</option>
                            <option value="개발 대기">개발 대기</option>
                            <option value="개발중">개발중</option>
                            <option value="적용 완료">적용 완료</option>
                            <option value="취소">취소</option>
                        </select>
                        <div class="d-flex gap-1 btn-group">
                            <button class="btn btn-sm btn-outline-secondary g-btn" onclick="setGanttMode('Day', this)">일</button>
                            <button class="btn btn-sm btn-outline-secondary g-btn" onclick="setGanttMode('Week', this)">주</button>
                            <button class="btn btn-sm btn-outline-secondary g-btn active" onclick="setGanttMode('Month', this)">월</button>
                        </div>
                    </div>
                    <div id="gantt-top-scroll"><div id="gantt-top-scroll-inner"></div></div>
                    <div id="gantt"></div>
                </div>
                <div id="monthly-view" class="tab-panel">
                    <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
                    <div class="accordion" id="monthlyAccordion"></div>
                </div>
                <div id="assignee-view" class="tab-panel"><div class="assignee-grid" id="assigneeGrid"></div></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white"><h6 class="modal-title" id="modalTaskTitle">상세 수정</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body p-4">
                    <form id="taskForm">
                        <input type="hidden" name="출처시트">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label small fw-bold">ID</label><input type="text" class="form-control bg-light" name="요구사항 ID" readonly></div>
                            <div class="col-md-6"><label class="form-label small fw-bold">진행단계</label>
                                <select class="form-select" name="진행단계">
                                    <option>작업 대기</option><option>진행중</option><option>검증 반영</option><option>개발 대기</option><option>개발중</option><option>적용 완료</option><option>취소</option>
                                </select>
                            </div>
                            <div class="col-12"><label class="form-label small fw-bold">요건명</label><textarea class="form-control" name="요건명" rows="2"></textarea></div>
                            <div class="col-md-4"><label class="form-label small fw-bold">담당 기획</label><input type="text" class="form-control" name="담당_기획"></div>
                            <div class="col-md-4"><label class="form-label small fw-bold">담당 디자인</label><input type="text" class="form-control" name="담당_디자인"></div>
                            <div class="col-md-4"><label class="form-label small fw-bold">담당 퍼블</label><input type="text" class="form-control" name="담당_퍼블"></div>
                            <div class="col-md-4"><label class="form-label small fw-bold">접수일자</label><input type="date" class="form-control" name="접수일자"></div>
                            <div class="col-md-4"><label class="form-label small fw-bold">운영이관일</label><input type="date" class="form-control" name="운영이관(예정)일"></div>
                            <div class="col-md-4"><label class="form-label small fw-bold">정산여부</label><select class="form-select" name="정산완료"><option value="">-</option><option value="여">여</option><option value="부">부</option></select></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button><button type="button" class="btn btn-success px-4" onclick="saveChanges()">저장</button></div>
            </div>
        </div>
    </div>

    <div class="drawer" id="statusDrawer">
        <div class="drawer-header"><h6 class="m-0" id="drawerTitle">목록</h6><button class="btn-close btn-close-white" onclick="closeDrawer()"></button></div>
        <div class="drawer-body" id="drawerBody"></div>
    </div>
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxJ2RfBGpKPy3xPgN83iW_dQMf5TsRYoCXp9nmkU6nO9TX-xFTCn21LaCu-uYBnJeQF/exec';
        let rawData = [], filter = 'all', calendar, gantt, chart, activeTab = 'calendar-view', isStatsCollapsed = false;
        let currentGanttMode = 'Month';
        const modal = new bootstrap.Modal(document.getElementById('eventModal'));

        const MAP = {
            '전체': { c: '#4b5563', i: '📋', b: '#f3f4f6' },
            '작업 대기': { c: '#8b5cf6', i: '⏳', b: '#f3e8ff' },
            '진행중': { c: '#005BAC', i: '🔵', b: '#eff6ff' },
            '검증 반영': { c: '#14b8a6', i: '🧪', b: '#ccfbf1' },
            '개발 대기': { c: '#f59e0b', i: '🟡', b: '#fef3c7' },
            '개발중': { c: '#f97316', i: '💻', b: '#ffedd5' },
            '적용 완료': { c: '#009A44', i: '✅', b: '#dcfce7' },
            '취소': { c: '#9ca3af', i: '⚪', b: '#f3f4f6' }
        };

        document.addEventListener('DOMContentLoaded', () => { initUI(); fetchData(); });

        function initUI() {
            let h = '';
            Object.entries(MAP).forEach(([k, v]) => {
                const id = k === '전체' ? 'all' : k.replace(/\s/g, '');
                h += `<div class="stat-card" onclick="showDrawer('${k}')"><div class="stat-icon" style="background:${v.b};color:${v.c}">${v.i}</div><div class="stat-text-box"><div class="stat-num" id="st-${id}">-</div><div class="stat-label">${k}</div></div></div>`;
            });
            document.getElementById('statsContainer').innerHTML = h;
            document.querySelectorAll('input[name="sheetFilter"]').forEach(r => r.onchange = (e) => { filter = e.target.value; updateStats(); render(); });

            // 간트 상단 스크롤 동기화
            const topScroll = document.getElementById('gantt-top-scroll');
            const ganttWrap = document.getElementById('gantt');
            let isSyncingTop = false, isSyncingBottom = false;

            topScroll.addEventListener('scroll', () => {
                if (!isSyncingTop) { isSyncingBottom = true; ganttWrap.scrollLeft = topScroll.scrollLeft; }
                isSyncingTop = false;
            });
            ganttWrap.addEventListener('scroll', () => {
                if (!isSyncingBottom) { isSyncingTop = true; topScroll.scrollLeft = ganttWrap.scrollLeft; }
                isSyncingBottom = false;
            });
        }

        function toggleStats() {
            isStatsCollapsed = !isStatsCollapsed;
            document.getElementById('statsContainer').classList.toggle('collapsed', isStatsCollapsed);
            document.getElementById('statsToggleBtn').innerText = isStatsCollapsed ? '펼치기 ▼' : '접기 ▲';
        }

        function fetchData() {
            toggleLoad(true);
            fetch(GAS_URL).then(r => r.json()).then(d => { rawData = d; toggleLoad(false); updateStats(); render(); }).catch(() => { alert('로드 실패'); toggleLoad(false); });
        }

        function updateStats() {
            const d = getFiltered();
            const allNum = document.getElementById('st-all');
            if(allNum) allNum.innerText = d.length;
            Object.keys(MAP).forEach(k => {
                if(k === '전체') return;
                const el = document.getElementById('st-' + k.replace(/\s/g, ''));
                if(el) el.innerText = d.filter(i => i['진행단계'] === k).length;
            });
        }

        function render() {
            if (activeTab === 'calendar-view') renderCalendar();
            else if (activeTab === 'gantt-view') setTimeout(renderGantt, 100);
            else if (activeTab === 'monthly-view') renderMonthly();
            else if (activeTab === 'assignee-view') renderAssignee();
        }

        function getFiltered() { return rawData.filter(i => filter === 'all' || i['출처시트'] === filter); }

        function getSafeDateStr(raw) {
            if (!raw || raw === '미정') return null;
            let d = new Date(raw);
            if (isNaN(d.getTime())) return null;
            let y = d.getFullYear();
            let m = String(d.getMonth() + 1).padStart(2, '0');
            let day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function renderCalendar() {
            const evs = getFiltered().flatMap(i => {
                const c = MAP[i['진행단계']]?.c || '#666';
                const r = [];
                let s = getSafeDateStr(i['접수일자']);
                let e = getSafeDateStr(i['운영이관(예정)일']);
                let sheet = i['출처시트'] ? String(i['출처시트']).substring(0, 1) : '-';
                
                if(s) r.push({ title: `[${sheet}] ${i['요건명']||''}`, start: s, color: c, allDay: true, extendedProps: i });
                
                if(e) {
                    let statusPrefix = '[예정]';
                    if (i['진행단계'] === '적용 완료') statusPrefix = '[완료]';
                    else if (i['진행단계'] === '취소') statusPrefix = '[취소]';
                    
                    r.push({ title: `[${sheet}] ${statusPrefix} ${i['요건명']||''}`, start: e, color: c, allDay: true, extendedProps: i });
                }
                return r;
            });
            if (calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), { 
                initialView: window.innerWidth < 640 ? 'listMonth' : 'dayGridMonth', 
                locale: 'ko', 
                events: evs, 
                displayEventTime: false, 
                eventClick: (info) => openPop(info.event.extendedProps) 
            });
            calendar.render();
        }

        function renderGantt() {
            const el = document.getElementById('gantt');
            if (!el || el.offsetWidth === 0) return;
            
            let d = getFiltered();
            const gFilter = document.getElementById('ganttFilter').value;
            
            if (gFilter === 'active') {
                d = d.filter(i => !['적용 완료', '취소'].includes(i['진행단계']));
            } else if (gFilter !== 'all') {
                d = d.filter(i => i['진행단계'] === gFilter);
            }

            if (d.length === 0) { 
                el.innerHTML = '<div class="py-5 text-center text-muted">항목 없음</div>'; 
                document.getElementById('gantt-top-scroll-inner').style.width = '100%';
                return; 
            }

            const todayStr = getSafeDateStr(new Date());
            const tasks = d.map((i, idx) => {
                let s = getSafeDateStr(i['접수일자']);
                let e = getSafeDateStr(i['운영이관(예정)일']);
                let err = false;

                if(!s) { s = todayStr; err = true; }
                if(!e) {
                    let tmp = new Date(s);
                    tmp.setDate(tmp.getDate() + 7);
                    e = getSafeDateStr(tmp);
                    err = true;
                }
                if(new Date(s) >= new Date(e)) {
                    let tmp = new Date(s);
                    tmp.setDate(tmp.getDate() + 1);
                    e = getSafeDateStr(tmp);
                    err = true;
                }

                let reqName = i['요건명'] ? String(i['요건명']).replace(/['"]/g, '') : '제목없음';
                let statusName = i['진행단계'] || '기타';

                // 막대 텍스트 간소화 (색상이 상태를 대변하므로 요건명만 노출)
                let displayName = err ? '⚠️ ' + reqName : reqName;

                return {
                    id: 'GT_' + idx,
                    name: displayName,
                    start: s, end: e, progress: 100,
                    custom_class: err ? 'g-err' : 'g-' + statusName.replace(/\s/g, ''),
                    extendedProps: i
                };
            });

            el.innerHTML = '';
            try {
                gantt = new Gantt("#gantt", tasks, { language: 'en', bar_height: 24, view_mode: currentGanttMode, on_click: (t) => openPop(t.extendedProps) });
                injectGanttCSS();
                syncGanttScroll();
            } catch(e) { 
                console.error("Gantt Error:", e);
                el.innerHTML = `<div class="gantt-error-box small">렌더링 오류: ${e.message}</div>`; 
            }
        }

        function injectGanttCSS() {
            const id = 'gantt-css';
            if (document.getElementById(id)) return;
            // 막대 색상을 !important로 강제 지정하고 글씨를 흰색으로 변경
            let css = `.gantt .bar-label { fill: #ffffff !important; font-size: 11px; font-weight: 500; } .gantt .grid-header { fill: #f4fbf7; }\n`;
            Object.entries(MAP).forEach(([k, v]) => { 
                if(k === '전체') return;
                css += `.gantt .bar.g-${k.replace(/\s/g, '')} .bar { fill: ${v.c} !important; opacity: 0.8; }\n`;
                css += `.gantt .bar.g-${k.replace(/\s/g, '')} .bar-progress { fill: ${v.c} !important; }\n`;
            });
            css += `.gantt .bar.g-err .bar { fill: #ff4d4f !important; opacity: 0.8; }\n.gantt .bar.g-err .bar-progress { fill: #ff4d4f !important; }\n`;
            
            // 모바일 최적화 미디어 쿼리
            css += `@media(max-width: 640px) { .gantt .bar-label { font-size: 10px; } }\n`;

            const s = document.createElement('style'); s.id = id; s.innerHTML = css; document.head.appendChild(s);
        }

        function syncGanttScroll() {
            setTimeout(() => {
                const svg = document.querySelector('#gantt svg');
                if (svg) {
                    document.getElementById('gantt-top-scroll-inner').style.width = svg.getBoundingClientRect().width + 'px';
                }
            }, 100);
        }

        function setGanttMode(m, btn) {
            currentGanttMode = m;
            document.querySelectorAll('.g-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(gantt) gantt.change_view_mode(m);
            syncGanttScroll();
        }

        function renderMonthly() {
            const d = getFiltered().filter(i => i['진행단계'] === '적용 완료' && i['운영이관(예정)일']);
            const mData = {};
            d.forEach(i => {
                const dateStr = getSafeDateStr(i['운영이관(예정)일']);
                if (!dateStr) return; 
                const ym = dateStr.substring(0, 7);
                if (!mData[ym]) mData[ym] = { 대: 0, 중: 0, 소: 0, list: [] };
                const scale = i['규모'] || '소';
                if (mData[ym][scale] !== undefined) mData[ym][scale]++;
                mData[ym].list.push(i);
            });
            const sorted = Object.keys(mData).sort().slice(-12);
            const ctx = document.getElementById('monthlyChart');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'bar', data: { labels: sorted, datasets: [{ label: '대', data: sorted.map(m => mData[m].대), backgroundColor: '#005BAC' }, { label: '중', data: sorted.map(m => mData[m].중), backgroundColor: '#009A44' }, { label: '소', data: sorted.map(m => mData[m].소), backgroundColor: '#76c893' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } } });
            
            let acc = '';
            sorted.reverse().forEach((m, idx) => {
                const items = mData[m].list.map(i => `<div class="d-flex justify-content-between border-bottom py-2 small" onclick="openPopById('${i['요구사항 ID']}')" style="cursor:pointer"><span>[${i['규모'] || '소'}] ${i['요건명']||''}</span><span class="badge ${i['정산완료'] === '여' ? 'bg-light text-dark' : 'bg-danger'}">${i['정산완료'] === '여' ? '정산완료' : '미정산'}</span></div>`).join('');
                acc += `<div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button collapsed py-2 small" data-bs-toggle="collapse" data-bs-target="#m${idx}">${m} 완료내역 (${mData[m].list.length}건)</button></h2><div id="m${idx}" class="accordion-collapse collapse"><div class="accordion-body p-2">${items}</div></div></div>`;
            });
            document.getElementById('monthlyAccordion').innerHTML = acc || '<p class="text-center py-4 text-muted small">완료 건 없음</p>';
        }

        function renderAssignee() {
            const active = getFiltered().filter(i => !['적용 완료', '취소'].includes(i['진행단계']));
            const uMap = {};
            active.forEach(i => {
                ['기획', '디자인', '퍼블'].forEach(role => {
                    const val = String(i['담당_' + role] || '');
                    if (val && val !== '-' && val !== 'X') {
                        val.split(/[,/]/).forEach(n => {
                            const name = n.trim();
                            if (!uMap[name]) uMap[name] = [];
                            if (!uMap[name].find(x => x['요구사항 ID'] === i['요구사항 ID'])) uMap[name].push(i);
                        });
                    }
                });
            });
            let h = '';
            Object.keys(uMap).sort().forEach(u => {
                const tasks = uMap[u].map(t => `<div class="task-item" onclick="openPopById('${t['요구사항 ID']}')"><div>${t['요건명']||''}</div><div class="mt-2 d-flex justify-content-between align-items-center"><span class="badge bg-light text-dark border" style="font-size:10px">${t['진행단계']||''}</span><span class="text-danger fw-bold" style="font-size:10px">${getDday(t['운영이관(예정)일'])}</span></div></div>`).join('');
                h += `<div class="assignee-card"><div class="d-flex justify-content-between align-items-center mb-2"><span class="assignee-name">${u}</span><span class="badge bg-white text-primary border">${uMap[u].length}</span></div>${tasks}</div>`;
            });
            document.getElementById('assigneeGrid').innerHTML = h || '<div class="w-100 py-5 text-center text-muted">진행 중인 업무 없음</div>';
        }

        function getDday(date) {
            let dStr = getSafeDateStr(date);
            if (!dStr) return '';
            const diff = Math.ceil((new Date(dStr) - new Date(getSafeDateStr(new Date()))) / 86400000);
            return diff === 0 ? 'D-Day' : (diff > 0 ? 'D-' + diff : 'D+' + Math.abs(diff));
        }

        function openPop(data) {
            document.getElementById('modalTaskTitle').innerText = data['요건명'] || '상세 정보';
            const f = document.getElementById('taskForm');
            
            Object.keys(data).forEach(k => {
                if(f.elements[k]) {
                    if (f.elements[k].type === 'date') {
                        f.elements[k].value = getSafeDateStr(data[k]) || '';
                    } else {
                        f.elements[k].value = data[k] || '';
                    }
                }
            });
            modal.show();
        }

        function openPopById(id) { const d = rawData.find(x => String(x['요구사항 ID']) === String(id)); if(d) openPop(d); }

        function saveChanges() {
            const payload = Object.fromEntries(new FormData(document.getElementById('taskForm')).entries());
            toggleLoad(true);
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r => r.json()).then(res => { if(res.result === 'success') { modal.hide(); fetchData(); } else alert('저장 실패'); });
        }

        function showDrawer(st) {
            const d = getFiltered().filter(i => st === '전체' || i['진행단계'] === st);
            document.getElementById('drawerTitle').innerText = `${st} (${d.length}건)`;
            document.getElementById('drawerBody').innerHTML = d.map(i => `<div class="drawer-item" onclick="openPopById('${i['요구사항 ID']}')"><div class="drawer-item-name">${i['요건명']||''}</div><div class="d-flex gap-2"><span class="badge bg-light text-dark border" style="font-size:10px">${i['출처시트']||''}</span><span class="small text-muted" style="font-size:10px">${i['진행단계']||''}</span></div></div>`).join('') || '<div class="text-center py-5 text-muted">데이터 없음</div>';
            document.getElementById('drawerOverlay').style.display = 'block';
            document.getElementById('statusDrawer').classList.add('open');
        }

        function closeDrawer() { document.getElementById('statusDrawer').classList.remove('open'); setTimeout(() => document.getElementById('drawerOverlay').style.display = 'none', 300); }
        function switchTab(btn) { document.querySelectorAll('.view-tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active')); activeTab = btn.dataset.target; document.getElementById(activeTab).classList.add('active'); render(); }
        function toggleLoad(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
