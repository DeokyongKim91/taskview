<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <title>업무 현황 통합 관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --brand-start: #009A44; --brand-end: #005BAC;
            --surface: #ffffff; --surface-2: #f4fbf7; --border: #d6eee3;
            --text-primary: #0d2318; --text-secondary: #527060;
            --radius-lg: 16px; --radius-md: 10px;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #eef8f2; min-height: 100vh; color: var(--text-primary); margin: 0; padding: 0; }

        /* 로그인 화면 */
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #009A44 0%, #005BAC 100%); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 100%; max-width: 360px; text-align: center; }
        .login-title { font-size: 22px; font-weight: 700; color: #005BAC; margin-bottom: 24px; }
        .login-input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--surface-2); }
        .password-wrap { position: relative; width: 100%; margin-bottom: 12px; }
        .password-wrap .login-input { margin-bottom: 0; padding-right: 60px; }
        .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: #fff; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; color: #555; padding: 4px 8px; font-size: 11px; font-weight: 500; z-index: 10; }
        .login-options { display: flex; justify-content: space-between; font-size: 13px; color: #555; margin-bottom: 20px; padding: 0 4px; }
        .login-options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .login-btn { width: 100%; padding: 12px; background: #009A44; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }

        /* 메인 영역 */
        .app-header { background: linear-gradient(135deg, #009A44 0%, #007a36 40%, #005BAC 100%); padding: 30px 24px 70px; position: relative; }
        .header-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .header-controls { position: absolute; top: 30px; right: 24px; display: flex; gap: 8px; }
        .header-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3); color: #fff; border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
        .update-time { font-size: 11px; background: rgba(0,0,0,0.15); padding: 2px 8px; border-radius: 12px; color: #fff; }
        
        .main-wrap { padding: 0 16px 40px; margin-top: -45px; position: relative; z-index: 1; max-width: 1300px; margin-left: auto; margin-right: auto; }
        .panel { background: var(--surface); border-radius: var(--radius-lg); box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); overflow: hidden; }

        #gantt-top-scroll { overflow-x: auto; overflow-y: hidden; height: 12px; background: #f8f9fa; border: 1px solid #eee; border-bottom: none; }
        #gantt-top-scroll-inner { height: 1px; }
        #gantt { overflow-x: auto; min-height: 450px; border: 1px solid #eee; }

        .admin-only { display: none !important; }
        #loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 10005; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>

<body>
    <div id="login-screen">
        <div class="login-box">
            <div class="login-title">업무 현황 관리 접속</div>
            <input type="text" id="loginId" class="login-input" placeholder="아이디">
            <div class="password-wrap">
                <input type="password" id="loginPw" class="login-input" placeholder="비밀번호">
                <button type="button" id="pwToggleBtn" class="pw-toggle" onclick="togglePassword()">보기</button>
            </div>
            <div class="login-options">
                <label><input type="checkbox" id="rememberId"> 아이디 저장</label>
                <label><input type="checkbox" id="keepLoggedIn"> 로그인 유지</label>
            </div>
            <button type="button" class="login-btn" onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <div id="app-container" style="display: none;">
        <div id="loading"><div class="spinner-border text-success mb-2"></div><div id="loadingText">데이터 동기화 중...</div></div>
        <div class="app-header">
            <h1 class="header-title">업무 현황 관리</h1>
            <div class="header-sub" style="color:#fff; font-size:13px;">
                <span>2026 기업뱅킹 상시운영 프로젝트</span> | 
                <span class="update-time" id="lastUpdateTime">⏱ 최종 동기화: -</span>
            </div>
            <div class="header-controls">
                <button class="header-btn admin-only" onclick="openCreatePop()">➕ 신규 등록</button>
                <button class="header-btn" onclick="fetchData()">↺ 새로고침</button>
                <button class="header-btn" onclick="logout()" style="background: rgba(0,0,0,0.2);">로그아웃</button>
            </div>
        </div>

        <div class="main-wrap">
            <div id="statsContainer" class="d-flex gap-2 mb-3"></div>
            <div class="panel">
                <div class="panel-toolbar p-3 border-bottom">
                    <div class="view-tabs">
                        <button class="view-tab-btn active" data-target="calendar-view" onclick="switchTab(this)">🗓 캘린더</button>
                        <button class="view-tab-btn" data-target="gantt-view" onclick="switchTab(this)">📊 간트차트</button>
                    </div>
                </div>
                <div class="view-body p-3">
                    <div id="calendar-view" class="tab-panel active"><div id="calendar"></div></div>
                    <div id="gantt-view" class="tab-panel">
                        <div id="gantt-top-scroll"><div id="gantt-top-scroll-inner"></div></div>
                        <div id="gantt"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwKkmycsNRvNZy18TJfQFamvvHLXZMBeN2Sf4fokyq__o9dxKjdgTF11TfLUngyh5pc/exec';
        let rawData = [], activeTab = 'calendar-view', currentUser = null;

        // ── 1. 비밀번호 보기 기능 (최우선 배치) ──
        function togglePassword() {
            const pwInput = document.getElementById('loginPw');
            const pwBtn = document.getElementById('pwToggleBtn');
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                pwBtn.innerText = '숨김';
            } else {
                pwInput.type = 'password';
                pwBtn.innerText = '보기';
            }
        }

        // ── 2. 로그인 처리 ──
        function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pw = document.getElementById('loginPw').value.trim();
            if(!id || !pw) return alert('아이디와 비밀번호를 입력하세요.');

            toggleLoad(true, "인증 중...");
            
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', id: id, password: pw })
            })
            .then(r => r.json())
            .then(res => {
                toggleLoad(false);
                if (res.result === 'success') {
                    if (document.getElementById('rememberId').checked) localStorage.setItem('savedId', id);
                    else localStorage.removeItem('savedId');

                    if (document.getElementById('keepLoggedIn').checked) localStorage.setItem('currentUser', JSON.stringify(res.user));
                    else sessionStorage.setItem('currentUser', JSON.stringify(res.user));
                    
                    location.reload(); // 성공 시 페이지 리로드하여 상태 반영
                } else {
                    alert('로그인 실패: ' + res.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert('네트워크 오류가 발생했습니다. GAS URL 및 배포 상태를 확인하세요.');
                toggleLoad(false);
            });
        }

        // ── 3. 초기화 및 상태 체크 ──
        document.addEventListener('DOMContentLoaded', () => {
            const savedId = localStorage.getItem('savedId');
            if (savedId) document.getElementById('loginId').value = savedId;

            let storedUser = sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                applyUserRoleUI();
                fetchData();
            }
        });

        function applyUserRoleUI() {
            if(!currentUser) return;
            document.getElementById('userInfoDisplay')?.innerText || console.log("User:", currentUser.name);
            if (currentUser.role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.style.setProperty('display', 'inline-block', 'important'));
            }
        }

        function fetchData() {
            toggleLoad(true, "데이터 동기화 중...");
            fetch(GAS_URL).then(r => r.json()).then(res => {
                rawData = res.data;
                document.getElementById('lastUpdateTime').innerText = '⏱ 최종 동기화: ' + res.updateTime;
                toggleLoad(false);
                render();
            }).catch(() => toggleLoad(false));
        }

        function render() {
            if (activeTab === 'calendar-view') renderCalendar();
            else if (activeTab === 'gantt-view') renderGantt();
        }

        function renderCalendar() {
            const evs = rawData.map(i => ({ title: i['요건명'], start: i['접수일자'], allDay: true }));
            const calEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calEl, { initialView: 'dayGridMonth', events: evs, locale: 'ko' });
            calendar.render();
        }

        function renderGantt() {
            const tasks = rawData.map((i, idx) => ({ id: 'T'+idx, name: i['요건명'], start: i['접수일자'], end: i['운영이관(예정)일'] || i['접수일자'], progress: 100 }));
            new Gantt("#gantt", tasks, { view_mode: 'Month', language: 'ko' });
            setTimeout(syncGanttScroll, 500);
        }

        function syncGanttScroll() {
            const container = document.querySelector('.gantt-container');
            const topBar = document.getElementById('gantt-top-scroll');
            const topBarInner = document.getElementById('gantt-top-scroll-inner');
            if (container && topBar) {
                topBarInner.style.width = container.querySelector('svg').getBoundingClientRect().width + 'px';
                topBar.onscroll = () => container.scrollLeft = topBar.scrollLeft;
                container.onscroll = () => topBar.scrollLeft = container.scrollLeft;
            }
        }

        function toggleLoad(s, m) {
            const el = document.getElementById('loading');
            document.getElementById('loadingText').innerText = m;
            el.style.display = s ? 'flex' : 'none';
        }

        function switchTab(btn) {
            document.querySelectorAll('.view-tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeTab = btn.dataset.target;
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(activeTab).classList.add('active');
            render();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            sessionStorage.removeItem('currentUser');
            location.reload();
        }
    </script>
</body>
</html>
